<div class="h-full bg-gray-50">

  <div class="flex min-h-full flex-col justify-center py-12 sm:px-6 lg:px-8">
    <div class="sm:mx-auto sm:w-full sm:max-w-md">

      <app-logo [isWhite]="false" [routerLink]="[ '/']"></app-logo>

      <h2 class="mt-6 text-center text-3xl font-bold tracking-tight text-gray-900">
        {{'Вход в личный кабинет' | translate}}
      </h2>
      <p class="mt-2 text-center text-sm text-gray-600">
        {{'После регистрации ты получишь ссылку для подтверждения своего профиля' | translate}}
      </p>
    </div>

    <div class="mt-8 sm:mx-auto sm:w-full sm:max-w-md">
      <div class="bg-white py-8 px-4 shadow sm:rounded-lg sm:px-10">
        <form class="space-y-6" (submit)="onLogin()" [formGroup]="form">
          <div>
            <div class="mt-1">
              <input id="email" name="email" type="email" autocomplete="email" required
                class="block w-full appearance-none rounded-full border border-gray-300 px-3 py-2 placeholder-gray-400 shadow-sm focus:border-indigo-500 focus:outline-none focus:ring-indigo-500 sm:text-sm"
                placeholder="username@supermail.com" formControlName="inputEmailLogin">
            </div>
          </div>


          <div>
            <button type="submit" [disabled]="form.get('inputEmailLogin').invalid || this.isPending.email"
              class="flex w-full justify-center rounded-full border border-transparent bg-indigo-600 py-2 px-4 text-sm font-medium text-white shadow-sm hover:bg-indigo-700 focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:ring-offset-2 disabled:bg-slate-400"
              style="align-items: center;">
              <div style="display: block;" class="w-4 h-4 mr-2 opacity-70">
                <img *ngIf="isPending.email" class="w-4 h-4 mr-2" src="./assets/svg/spinner_white.svg" alt="">
              </div>

              {{'Получить магическую ссылку' | translate}}
            </button>
          </div>
        </form>


        <div class="mt-8">
          <app-tw-toggle [enabledText]="'Я агентство недвижимости' | translate"
            [disabledText]="'Я покупатель' | translate" (getToggleStatus)="setAgentToggle($event)" [isEnabled]="false"
            class="col-span-6
                sm:col-span-3 mt-3">
          </app-tw-toggle>
        </div>

      </div>
    </div>
  </div>
</div>
