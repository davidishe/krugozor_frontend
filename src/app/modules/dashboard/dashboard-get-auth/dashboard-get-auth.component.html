<ng-container *ngIf="(popoverState$ | async)?.popoverType === 'get_auth' && (popoverState$ | async)?.status === true">

  <div class="fixed inset-0 z-10 overflow-y-hidden">
    <div class="flex min-h-full items-center justify-center p-4 text-center sm:items-center sm:p-0">

      <div
        class="relative transform overflow-hidden rounded-lg bg-white px-4 pt-5 pb-4 text-left shadow-xl transition-all sm:my-8 sm:w-full sm:max-w-sm sm:p-6">
        <div>
          <div class="mx-auto flex h-32 w-32 items-center justify-center">

            <img src="./assets/svg/persons/get_auth.svg" alt="">


          </div>
          <div class="mt-3 text-center sm:mt-5">
            <h3 class="text-lg font-medium leading-6 text-gray-900" id="modal-title">
              {{ 'Необходима авторизация для продолжения' | translate }}
            </h3>
            <div class="mt-7">
              <ng-content></ng-content>
              {{'Пожалуйста, пройди авторизацию и представься, чтобы продолжить работать на платформе. Это займет менее одной минуты!' | translate}}
            </div>
          </div>
        </div>
        <div class="mt-5 sm:mt-6">
          <button type="button" (click)="goToAuthPage()"
            class="inline-flex w-full justify-center rounded-full border border-transparent bg-indigo-600 px-4 py-2 text-base font-medium text-white shadow-sm hover:bg-indigo-700 focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:ring-offset-2 sm:text-sm">
            {{'Перейти к авторизации' | translate}}
          </button>
          <button type="button" (click)="close()"
            class="mt-3 inline-flex w-full justify-center rounded-full border border-indigo-600 bg-white px-4 py-2 text-base font-medium text-indigo-600 shadow-sm hover:bg-slate-50 focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:ring-offset-2 sm:text-sm">
            {{'Сделаю попозже' | translate}}
          </button>
        </div>
      </div>
    </div>
  </div>

</ng-container>
