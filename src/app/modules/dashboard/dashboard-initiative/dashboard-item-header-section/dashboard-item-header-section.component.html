<div class="lg:flex lg:items-center lg:justify-between mt-5">
  <div class="min-w-0 flex-1">
    <h1 class="text-3xl font-bold tracking-tight text-gray-900">
      {{title}}
    </h1>
  </div>


  <div class="mt-5 flex lg:mt-0 lg:ml-4 align-top justify-center">
    <span class="sm:block">

    </span>

    <span class="ml-3 sm:block">
    </span>


  </div>
</div>

<div class="w-full flex justify-between">
  <div class="mt-1 flex flex-col sm:mt-0 sm:flex-row sm:flex-wrap sm:space-x-6" style="cursor: default;">


    <div class="mt-2 flex items-center text-sm opacity-50">
      <img class="mr-1.5 h-5 w-5 flex-shrink-0 text-gray-400" src="./assets/svg/tw_category.svg" alt="">
      <ng-content select="[category]"></ng-content>
    </div>


    <ng-container *ngFor="let location of locations; let i=index">
      <div class="mt-2 flex items-center text-sm opacity-50">
        <img class="mr-1.5 h-5 w-5 flex-shrink-0 text-gray-400" src="./assets/svg/tw_location.svg" alt="">
        {{ location.attributes.name}}
      </div>
    </ng-container>


    <div class="mt-2 flex items-center text-sm opacity-50">
      <img class="mr-1.5 h-5 w-5 flex-shrink-0 text-gray-400" src="./assets/svg/tw_calendar.svg" alt="">
      <ng-content select="[created]"></ng-content>
    </div>

  </div>

  <div class="mt-4 flex items-center justify-between sm:mt-0 sm:ml-6 sm:flex-shrink-0 sm:justify-start">
    <span *ngIf="false"
      class="inline-flex items-center rounded-full bg-cyan-100 px-3 py-0.5 text-sm font-medium text-cyan-800">
      Open
    </span>
    <div class="relative ml-3 inline-block text-left">
      <div>
        <button type="button" (click)="isOpen = !isOpen"
          class="-my-2 flex items-center rounded-full p-2 text-gray-400 hover:text-gray-600 focus:outline-none focus:ring-2 focus:ring-blue-600 bg-slate-100"
          id="menu-3-button" aria-expanded="false" aria-haspopup="true">
          <span class="sr-only">Open options</span>
          <!-- Heroicon name: mini/ellipsis-vertical -->
          <svg class="h-5 w-5" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20" fill="#000000" aria-hidden="true">
            <path
              d="M10 3a1.5 1.5 0 110 3 1.5 1.5 0 010-3zM10 8.5a1.5 1.5 0 110 3 1.5 1.5 0 010-3zM11.5 15.5a1.5 1.5 0 10-3 0 1.5 1.5 0 003 0z" />
          </svg>
        </button>
      </div>

      <!--
        Dropdown menu, show/hide based on menu state.

        Entering: "transition ease-out duration-100"
          From: "transform opacity-0 scale-95"
          To: "transform opacity-100 scale-100"
        Leaving: "transition ease-in duration-75"
          From: "transform opacity-100 scale-100"
          To: "transform opacity-0 scale-95"
        -->
      <div *ngIf="isOpen"
        class="absolute right-0 z-10 w-56 origin-top-right rounded-md bg-white shadow-lg ring-1 ring-black ring-opacity-5 focus:outline-none mt-4"
        role="menu" aria-orientation="vertical" aria-labelledby="menu-3-button" tabindex="-1">
        <div class="py-1" role="none">
          <!-- Active: "bg-gray-100 text-gray-900", Not Active: "text-gray-700" -->
          <button type="button" class="text-gray-700 flex w-full justify-between px-4 py-2 text-sm" role="menuitem"
            tabindex="-1" id="menu-3-item-0">
            <span>Copy email address</span>
          </button>
          <button type="button" class="text-gray-700 flex w-full justify-between px-4 py-2 text-sm" role="menuitem"
            tabindex="-1" id="menu-3-item-0">
            <span>Copy email address</span>
          </button>
          <button type="button" class="text-gray-700 flex w-full justify-between px-4 py-2 text-sm" role="menuitem"
            tabindex="-1" id="menu-3-item-0">
            <span>Copy email address</span>
          </button>
          <a class="text-gray-700 flex justify-between px-4 py-2 text-sm" role="menuitem" tabindex="-1"
            id="menu-3-item-1">
            <span>Previous conversations</span>
          </a>
          <a class="text-gray-700 flex justify-between px-4 py-2 text-sm" role="menuitem" tabindex="-1"
            id="menu-3-item-2">
            <span>View original</span>
          </a>
        </div>
      </div>
    </div>
  </div>

</div>
