<div>
  <div class="mt-1 flex items-center">
    <span class="inline-block h-12 w-12 overflow-hidden rounded-full bg-gray-100"
      style="justify-content: center; align-items: center; vertical-align: middle; display: flex;">

      <ng-container *ngIf="!((currentUser$ | async)?.pictureUrl) && !progress">
        <svg class="h-full w-full text-gray-300" fill="currentColor" viewBox="0 0 24 24" (click)="file.click()">
          <path
            d="M24 20.993V24H0v-2.996A14.977 14.977 0 0112.004 15c4.904 0 9.26 2.354 11.996 5.993zM16.002 8.999a4 4 0 11-8 0 4 4 0 018 0z" />
        </svg>
      </ng-container>


      <ng-container *ngIf="progress">
        <img class="h-5 w-5 relative" src="./assets/svg/spinner.svg" alt="">
      </ng-container>



      <ng-container *ngIf="(currentUser$ | async)?.pictureUrl && !progress">
        <img style="display: block;" [src]="(currentUser$ | async)?.pictureUrl | secure | async">
      </ng-container>


    </span>


    <button type="button" class="ml-5 rounded-full border border-gray-300 bg-white py-2 px-3 text-sm font-medium leading-4 text-gray-700
      shadow-sm hover:bg-gray-50 focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:ring-offset-2"
      (click)="file.click()">
      {{'Изменить' | translate}}
    </button>
  </div>
  <input class="hidden" type="file" #file placeholder="Выбери файл" (change)="uploadFile(file.files)"
    style="display:none;">
</div>
