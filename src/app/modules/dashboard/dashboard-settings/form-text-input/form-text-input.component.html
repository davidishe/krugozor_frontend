<div [formGroup]="form">
  <label class="block text-sm font-medium text-gray-700 sm:mt-px sm:pt-0">{{label | translate}}</label>
  <div class="relative rounded-md  flex mb-0">

    <div *ngIf="isWithIcon"
      class="pointer-events-none absolute inset-y-0 right-0 flex items-center pr-3 cursor-default">
      <img *ngIf="icon" class="h-5 w-5 text-gray-400 opacity-50 cursor-default" src="./assets/svg/{{icon}}.svg" alt="">
    </div>

    <input [formControlName]="form_ControlName" [formControl]="control_name" type="{{type}}" name="email" id="email"
      class=" pl-3 block w-full rounded-md border-0 py-1.5 text-gray-900 shadow-sm ring-1 ring-inset ring-gray-300 placeholder:text-gray-400 focus:ring-2 focus:ring-inset focus:ring-indigo-600 sm:text-sm sm:leading-6"
      autocomplete="off" placeholder="{{placeholder}}" value='value' #input (input)="notifyWhenChanged()"
      (keyup.enter)="notifyWhenEnter()">
  </div>

</div>
