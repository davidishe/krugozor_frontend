    <div class="w-9 h-9 flex justify-center items-center rounded-full bg-indigo-50 mb-3 md:mb-0">
      <img class="h-6 w-6 opacity-60" src="./assets/svg/{{icon}}.svg">
    </div>
    <div class="font-display text-lg text-slate-900 flex align-middle items-center ml-0 md:ml-3 font-semibold ">

  <div class="mt-4 text-slate-600 text-base leading-6">
