<div class="bg-white">
  <div
    class="mx-auto py-16 sm:py-32 lg:py-24   px-4 sm:px-6 text-left h-fit md:h-2/3 align-top justify-center flex flex-col lg:px-16 items-start md:max-w-full lg:max-w-screen-xl max-w-lg">
    <div class="divide-y divide-gray-900/10" style="width: 100%;">
      <div class="mx-auto max-w-2xl lg:mx-0 min-w-full justify-start text-left">
        <app-landing-title
          subtitle="{{'Если ты не нашел ответ на вопрос, пожалуйста, напиши его администратору.' | translate}}">
          {{'Часто задаваемые вопросы' | translate}}
        </app-landing-title>
      </div>
      <dl class="mt-10 space-y-6 divide-y divide-gray-900/10">
        <ng-container *ngFor="let item of items; let i=index">
          <app-landing-faq-item [item]="item" (click)="changeState(item)">
          </app-landing-faq-item>
        </ng-container>
        <!-- More questions... -->
      </dl>
    </div>
  </div>
</div>
