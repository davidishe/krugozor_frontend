<div class="w-full bg-white">
  <div class="mx-auto px-4 sm:px-6 text-left h-fit md:h-2/3 align-top justify-center flex flex-col lg:px-16 
    items-start lg:max-w-screen-xl">
    <app-landing-title [isDarkTheme]="false" subtitle="{{'' | translate}}">
      {{title}}
    </app-landing-title>


    <div class="my-4 relative w-full">


      <div class="mx-auto md:max-w-full lg:max-w-screen-xl max-w-lg">


        <div class="mt-6 text-slate-600 text-base leading-6 mx-auto md:max-w-full lg:max-w-screen-xl max-w-lg">


          <div class="flex flex-row">
            <div class="max-w-sm gap-y-9">
              <div class="mb-4 w-full relative">
                <span
                  class=" hidden lg:block absolute w-3 h-3 -left-7 top-2 rounded-full bg-slate-600 opacity-50"></span>
                <span>
                  {{text1}}
                </span>
              </div>
              <div class="mb-4 w-full relative">
                <span
                  class=" hidden lg:block absolute w-3 h-3 -left-7 top-2 rounded-full bg-slate-600 opacity-50"></span>
                <span>
                  {{text2}}
                </span>
              </div>
              <div class="mb-4 w-full relative">
                <span
                  class=" hidden lg:block absolute w-3 h-3 -left-7 top-2 rounded-full bg-slate-600 opacity-50"></span>
                <span>
                  {{text3}}
                </span>
              </div>
              <br>
              <br>
            </div>
            <div class="hidden relative w-1/2 justify-center items-center md:flex">
              <img class="relative -bottom-9 w-60" style="z-index: 1; left: 100px;"
                src="./assets/img/{{imgPathSmall}}.png" alt="">
            </div>

          </div>


          <div class="relative isolate">
            <div class="absolute inset-x-0 -top-40 -z-10 transform-gpu overflow-hidden blur-3xl sm:-top-80"
              aria-hidden="true">
              <div
                class="relative left-[calc(50%-11rem)] aspect-[1155/678] w-[36.125rem] -translate-x-1/2 rotate-[30deg] bg-gradient-to-tr from-[#ff80b5] to-[#9089fc] opacity-30 sm:left-[calc(50%-30rem)] sm:w-[72.1875rem]"
                style="clip-path: polygon(74.1% 44.1%, 100% 61.6%, 97.5% 26.9%, 85.5% 0.1%, 80.7% 2%, 72.5% 32.5%, 60.2% 62.4%, 52.4% 68.1%, 47.5% 58.3%, 45.2% 34.5%, 27.5% 76.7%, 0.1% 64.9%, 17.9% 100%, 27.6% 76.8%, 76.1% 97.7%, 74.1% 44.1%)">
              </div>
            </div>
            <div class="mx-auto max-w-7xl">
              <div class="flow-root">
                <div
                  class="-m-2 rounded-xl bg-gray-900/5 p-2 ring-1 ring-inset ring-gray-900/10 lg:-m-4 lg:rounded-2xl lg:p-4">
                  <img src="./assets/img/{{imgPathBig}}.png" alt="App screenshot" width="2432" height="1442"
                    class="rounded-md shadow-2xl ring-1 ring-gray-900/10">
                </div>
              </div>
            </div>
            <div
              class="absolute inset-x-0 top-[calc(100%-13rem)] -z-10 transform-gpu overflow-hidden blur-3xl sm:top-[calc(100%-30rem)]"
              aria-hidden="true">
              <div
                class="relative left-[calc(50%+3rem)] aspect-[1155/678] w-[36.125rem] -translate-x-1/2 bg-gradient-to-tr from-[#ff80b5] to-[#9089fc] opacity-30 sm:left-[calc(50%+36rem)] sm:w-[72.1875rem]"
                style="clip-path: polygon(74.1% 44.1%, 100% 61.6%, 97.5% 26.9%, 85.5% 0.1%, 80.7% 2%, 72.5% 32.5%, 60.2% 62.4%, 52.4% 68.1%, 47.5% 58.3%, 45.2% 34.5%, 27.5% 76.7%, 0.1% 64.9%, 17.9% 100%, 27.6% 76.8%, 76.1% 97.7%, 74.1% 44.1%)">
              </div>
            </div>
          </div>



          <br>
          <br>
        </div>
      </div>
    </div>
  </div>

</div>
