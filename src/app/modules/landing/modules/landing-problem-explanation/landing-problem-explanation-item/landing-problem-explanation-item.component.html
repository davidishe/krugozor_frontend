<div class="md:flex flex-col items-center mt-5 md:mt-10 bg-gray-50 py-10"
  [ngClass]="{'flex-col md:flex-row': !isReversed, 'md:flex-row-reverse flex-col-reverse': isReversed}">

  <div class="flex items-center align-middle justify-center flex-col w-full h-full md:col-span-7"
    [ngClass]="{'md:pr-20 md:pl-20': isReversed, 'md:pr-16 md:pl-16': !isReversed}">
    <p class="text-base leading-6 text-center md:text-left pl-0  text-gray-700 max-w-md"
      [ngClass]="{'pl-0 md:pl-20': !isReversed}">
      <ng-content></ng-content>
    </p>
  </div>

  <div class="w-full align-middle flex md:col-span-5 mt-5 md:mt-0 justify-center"
    [ngClass]="{'items-center md:justify-start': !isReversed, 'items-center md:items-end  md:justify-end': isReversed,}">
    <div class="aspect-w-5 align-middle flex md:px-24"
      [ngClass]="{'items-center justify-center md:items-start md:justify-start': !isReversed}">
      <img src="./assets/svg/landing/{{icon}}.svg"
        alt="White canvas laptop sleeve with gray felt interior, silver zipper, and tan leather zipper pull."
        class="h-32 object-cover object-center md:h-48 lg:h-52 relative">
    </div>
  </div>


</div>
