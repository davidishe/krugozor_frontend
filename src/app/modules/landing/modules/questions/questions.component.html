  ```
  // tailwind.config.js
  module.exports = {
    // ...
    plugins: [
      // ...
      require('@tailwindcss/forms'),
    ],
  }
  ```
-->
<div class="bg-white py-16 sm:py-24">
  <div class="mx-auto max-w-7xl sm:px-6 lg:px-8">
    <div class="relative isolate overflow-hidden bg-indigo-800 px-6 py-24 shadow-2xl sm:rounded-3xl sm:px-24 xl:py-32">
      <h2 class="mx-auto max-w-2xl text-center text-2xl md:text-3xl font-bold text-white">
        {{title | translate}}
      </h2>
      <p class="mx-auto mt-2 max-w-xl text-center text-base leading-6 text-gray-300">
        {{subtitle | translate}}
      </p>


      <ng-container *ngIf="isSended === false">

      </ng-container>

      <form class="mx-auto mt-10 flex max-w-md gap-x-4 gap-y-4 md:gap-y-0 justify-center flex-col md:flex-row"
        [formGroup]="form">

        <label for="phone" class="sr-only">{{'Телефон'}}</label>
        <input id="phone" name="phone" type="phone" autocomplete="off" required class="placeholder:text-xs md:placeholder:text-base min-w-0 flex-auto rounded-full border-0 bg-white/5 px-3.5
            py-2 text-white shadow-sm ring-1 ring-inset ring-white/10 focus:ring-2 focus:ring-inset focus:ring-white
            sm:text-sm sm:leading-6" placeholder="{{'+79952000011' | translate}}" formControlName="phone" name="phone"
          style="max-width: 150px;">
        <button type="button" class="flex-none text-sm font-semibold  leading-6 border hover:opacity-100 border-indigo-200
            text-indigo-200 hover:text-white cursor-pointer hover:border-white rounded-full px-3.5 py-2.5 transition
            shadow-sm focus-visible:outline focus-visible:outline-2 focus-visible:outline-offset-2
            focus-visible:outline-indigo-100 w-fit" (click)="sendFeedbackToServer()" [disabled]="form.invalid"
          [ngClass]="{'pointer-events-none hidden': form.invalid}">
          {{'Отправить' | translate}}
        </button>



      </form>
    </div>
  </div>
</div>
