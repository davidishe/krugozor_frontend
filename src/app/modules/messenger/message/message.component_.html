<div class="flex w-full mt-8  mr-auto justify-start">


  <!-- recepient avatar -->
  <ng-container>
    <div class="block align-bottom justify-start">
      <img class="mx-3 flex-shrink-0 h-10 w-10 rounded-full bg-gray-300" src="{{userToShow?.pictureUrl}}" alt="">
    </div>
  </ng-container>
  <!-- end recepient avatar -->



  <!-- end author avatar profiule -->
  <div class="flex flex-col max-w-md pl-3 px-4">

    <p class="text-sm font-semibold mb-1">
      {{userToShow?.firstName }} {{userToShow?.secondName}}
    </p>

    <div class=" pt-3 pb-7 rounded-xl relative rounded-tl-none">
      <div class="pl-3 pt-3 px-4 pb-7 rounded-xl relative rounded-tl-none" [ngClass]="{'bg-indigo-600 text-white': isMyMessage, 
    'bg-gray-200 text-black': !isMyMessage}">



        <div id="{{elementId}}" class="h-fit">
          <span class="text-sm block flex-wrap h-fit" style="min-width: 140px;">
            <ng-content></ng-content>
          </span>

          <ng-container *ngIf="files?.length > 0">
            <ng-container *ngFor="let file of files; let i=index">
              <div class="cursor-pointer my-4 flex-col md:flex md:flex-row" (click)="save(file)">

                <app-tw-button-icon-textless class="mr-3" icon="mime/{{file.fileType | mime}}">
                </app-tw-button-icon-textless>

                <div class="text-sm flex flex-col" style="max-width: 220px;">
                  <p class="flex flex-wrap text-sm">
                    {{file.fileName }}
                  </p>
                  <p class="text-xs">
                    {{file.fileSize | filesize}}
                  </p>
                </div>
              </div>
            </ng-container>
          </ng-container>



        </div>
        <!-- <span class="text-xs leading-none absolute bottom-2 left-3">
          {{message?.createdAt | timeago}}
        </span> -->

        <!-- <ng-container *ngIf="isMyMessage">
          <ng-container *ngIf="message?.isReaded">
            <span class="absolute bottom-1 right-2">
              <img src="./assets/svg/readed.svg" alt="">
            </span>
          </ng-container>

          <ng-container *ngIf="message?.isReaded === false">
            <span class="absolute bottom-1 right-2">
              <img src="./assets/svg/readed_false.svg" alt="">
            </span>
          </ng-container>
        </ng-container> -->
      </div>





    </div>



  </div>





</div>
