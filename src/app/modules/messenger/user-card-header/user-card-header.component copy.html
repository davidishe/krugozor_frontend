<div class="flex justify-between items-center p-3 hover:bg-gray-800 bg-slate-800 rounded-lg relative cursor-pointer">
  <div class="w-16 h-16 relative flex flex-shrink-0">


    <ng-container *ngIf="progress && !userToShow; else elseTemplate">
      <div class="shadow-md rounded-full w-full h-full object-cover flex items-center justify-center">
        <img class="shadow-md rounded-full w-5 h-5 object-cover" src="./assets/svg/spinner.svg" alt="">
      </div>
    </ng-container>

    <ng-template #elseTemplate>
      <ng-container *ngIf="!(userToShow).pictureUrl; else ava">
        <svg class="shadow-md rounded-full w-full h-full object-cover" fill="currentColor" viewBox="0 0 24 24">
          <path
            d="M24 20.993V24H0v-2.996A14.977 14.977 0 0112.004 15c4.904 0 9.26 2.354 11.996 5.993zM16.002 8.999a4 4 0 11-8 0 4 4 0 018 0z" />
        </svg>
      </ng-container>

      <ng-template #ava>
        <img class="shadow-md rounded-full w-full h-full object-cover transition-all"
          [src]="(userToShow)?.pictureUrl | secure | async" alt="" />
      </ng-template>
    </ng-template>


    <ng-container *ngIf="(userToShow?.id | online)">
      <div class="absolute bg-gray-900 p-1 rounded-full bottom-0 right-0">
        <div class="bg-green-500 rounded-full w-3 h-3"></div>
      </div>
    </ng-container>





  </div>
  <div class="flex-auto min-w-0 ml-4 mr-6 hidden md:block group-hover:block">
    <p>Angelina Jolie</p>
    <div class="flex items-center text-sm text-gray-600">
      <div class="min-w-0">
        <p class="truncate">Ok, see you at the subway in a bit.</p>
      </div>
      <p class="ml-2 whitespace-no-wrap">Just now</p>
    </div>
  </div>
</div>
