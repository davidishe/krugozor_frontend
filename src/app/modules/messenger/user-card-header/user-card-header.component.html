<div
  class="flex justify-center md:justify-between items-center p-3 hover:bg-gray-100  rounded-lg relative cursor-pointer"
  [ngClass]="{'bg-indigo-100 hover:bg-indigo-100': isSelected, 'hover:bg-slate-200 transition cursor-pointer': isSidebarMenu}">
  <div class="w-16 h-16 relative flex flex-shrink-0 align-middle items-center justify-center">


    <ng-container *ngIf="(+userToShow?.pictureUrl.length > 0); else elsePicture">
      <img class="shadow-md rounded-full h-8 w-8 md:w-full md:h-full object-cover" src="{{userToShow?.pictureUrl}}"
        alt="" />
    </ng-container>
    <ng-template #elsePicture>
      <div class="w-full h-full flex items-center justify-center align-middle">
        <svg class="w-4 h-4 text-gray-300" fill="currentColor" viewBox="0 0 24 24">
          <path
            d="M24 20.993V24H0v-2.996A14.977 14.977 0 0112.004 15c4.904 0 9.26 2.354 11.996 5.993zM16.002 8.999a4 4 0 11-8 0 4 4 0 018 0z" />
        </svg>
      </div>
    </ng-template>


    <ng-container *ngIf="(userToShow?.id | online)">
      <div class="absolute bg-gray-900 p-1 rounded-full bottom-0 right-0">
        <div class="bg-green-500 rounded-full w-3 h-3"></div>
      </div>
    </ng-container>





  </div>
  <div class="flex-auto min-w-0 ml-4 mr-6 hidden md:block group-hover:block text-gray-900">
    <p class="font-medium">
      {{userToShow.firstName}}
      {{userToShow.secondName}}
    </p>
    <div class="flex items-start flex-col text-sm">
      <div class="min-w-0">
        <p class="truncate">
          <ng-container *ngIf="lastMessage?.length >= 17; else elseTemplate">
            {{lastMessage | slice:0:17}}...
          </ng-container>
          <ng-template #elseTemplate>
            {{lastMessage}}
          </ng-template>


        </p>
      </div>
      <p class="whitespace-no-wrap text-gray-400">
        {{userToShow.wasOnline | timeago}}
      </p>
    </div>
  </div>
</div>
