<ng-container>
  <button type="button" class="
  
    relative inline-flex  items-center rounded-full 
      px-2.5
    py-2
    text-sm font-medium 
    text-gray-700
    border border-gray-300 bg-white
    shadow-sm hover:bg-gray-50 focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:ring-offset-2
    " [ngClass]="{'cursor-wait':
        isLoading }">
    <ng-container *ngIf="iconPath && !isLoading">
      <img src="./assets/svg/{{iconPath}}.svg" class="mr-2 h-4 w-4 " alt="">
    </ng-container>

    <ng-container *ngIf="isLoading">
      <img src="./assets/svg/spinner_white.svg" class="mr-2 h-4 w-4 " alt="">
    </ng-container>

    <span>
      <ng-content></ng-content>
    </span>
  </button>
</ng-container>
