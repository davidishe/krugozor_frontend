<div class="w-full toast-wrapper"
  [ngClass]="{'-z-30 hidden invisible w-0 h-0 absolute top-0 left-0 bg-black': !((alertSettings$ | async)?.isVisible)}">
  <div id="toast" [ngClass]="{'-z-20': !((alertSettings$ | async)?.isVisible),
        'show': ((alertSettings$ | async)?.isVisible), 
      'bg-indigo-700': ((alertSettings$ | async)?.color === 'info'),
      'bg-green-700': ((alertSettings$ | async)?.color === 'green'),
      'bg-red-700': ((alertSettings$ | async)?.color === 'red')}" class="p-4 mx-4 sm:px-6 lg:mx-16 ">
    <div class="flex flex-row text-gray-100">
      <div class="flex-shrink-0 flex items-center">
        <img class="h-5 w-5" src=" ./assets/svg/{{(alertSettings$ | async)?.icon}}.svg" alt="">
      </div>
      <div class="text-sm  text-left pl-4 flex flex-col">
        <div>
          {{(alertSettings$ | async)?.message}}
        </div>
        <div>
          {{(alertSettings$ | async)?.secondMessage}}
        </div>
      </div>
      <div class=" flex justify-center items-center">
        <p class="text-sm ml-9 mr-3" *ngIf="(alertSettings$ | async)?.routerText">
          <a class="p-2 px-3 rounded-full whitespace-nowrap font-medium cursor-pointer bg-white bg-opacity-10 hover:bg-opacity-20 transition"
            [routerLink]="[ (alertSettings$ | async)?.routerPath ]" (click)="close()">
            {{((alertSettings$ | async)?.routerText)}}
            <span aria-hidden="true"> &rarr;</span>
          </a>
        </p>


      </div>
    </div>
  </div>
</div>
