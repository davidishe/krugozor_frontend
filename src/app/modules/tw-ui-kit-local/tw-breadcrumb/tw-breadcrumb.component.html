    <!-- {{ categorys | json}} -->

    <ol role="list" class="flex items-center space-x-2 ml-0">

      <li class="mr-0" *ngIf="params.categorys.length > 0">
        <div class="flex items-center opacity-100">
          <a class="text-sm  text-gray-800 cursor-default">
            {{'Все категории' | translate}}
          </a>
        </div>
      </li>

      <ng-container *ngFor="let category of categorys; let i=index">
        <li (click)="goToCategorySection(category)">
          <div class="flex items-center">
            <svg class="h-5 w-5 flex-shrink-0 text-gray-500" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20"
              fill="#000000" aria-hidden="true">
              <path fill-rule="evenodd"
                d="M7.21 14.77a.75.75 0 01.02-1.06L11.168 10 7.23 6.29a.75.75 0 111.04-1.08l4.5 4.25a.75.75 0 010 1.08l-4.5 4.25a.75.75 0 01-1.06-.02z"
                clip-rule="evenodd" />
            </svg>
            <a class="ml-1 text-sm font-normal text-gray-500 cursor-pointer hover:underline hover:text-indigo-600"
              aria-current="page">
              {{category.name }}
            </a>
          </div>
        </li>

      </ng-container>




    </ol>
