<div class="group relative">
  <div
    class="min-h-80 aspect-w-1 aspect-h-1 w-full overflow-hidden rounded-md bg-gray-200 group-hover:opacity-75 lg:aspect-none lg:h-80 skeleton"
    style="transition: all ease-in-out 0.2s;">


  </div>
  <div class="mt-4 flex justify-between">
    <div>
      <p class="text-sm font-medium text-gray-900 mb-2">

        <ng-container *ngIf="item.name.length < 30">
          {{ item.name | slice:0:30  }}
        </ng-container>

        <ng-container *ngIf="item.name.length >= 30">
          {{ item.name | slice:0:30  }} ...
        </ng-container>

      </p>

      <h3 class="text-sm text-gray-700">
        <div style="cursor: pointer;">
          <span aria-hidden="true" class="absolute inset-0">
          </span>

          <app-tw-badge>

          </app-tw-badge>

        </div>
      </h3>
      <p class="mt-1 text-sm text-gray-500">
        <ng-container *ngIf="item.description.length >= 100">
          {{ item.description  | slice:0:100 }}...
        </ng-container>
        <ng-container *ngIf="item.description.length < 100">
          {{ item.description  | slice:0:100 }}
        </ng-container>


      </p>
    </div>

  </div>
</div>
