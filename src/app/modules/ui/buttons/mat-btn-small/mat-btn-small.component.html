<button class="btn-small" [disabled]="disabled" type="{{type}}"
  [ngStyle]="{'background-color': bgcolor, 'color': font, 'border-color': borderColor }"
  [ngClass]="{'width': isFlexWidth}">
  <i *ngIf="icon" class="material-icons">{{icon}}</i>
  <!-- <mat-spinner *ngIf="isPending" diameter=22></mat-spinner> -->
  <div style="display: flex; height: 20px; align-items: center; vertical-align: middle;">
    <ion-spinner *ngIf="isPending" name="crescent"></ion-spinner>
  </div>
  <img style="width: 22px; margin-right: 9px; height: 22px;" *ngIf="svg && !isPending" src="{{svg}}" aria-hidden="true">
  <span *ngIf="!isPending">{{text}}</span>
</button>
