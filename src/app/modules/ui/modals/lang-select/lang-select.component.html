  <div class="fixed inset-0 z-10 overflow-y-hidden"
    *ngIf="(popoverState$ | async)?.popoverType === 'lang' && (popoverState$ | async)?.status === true">
    <div class="flex min-h-full items-center justify-center p-4 text-center sm:items-center sm:p-0">

      <div
        class="relative transform overflow-hidden rounded-lg bg-white px-4 pt-5 pb-4 text-left shadow-xl transition-all sm:my-8 sm:w-full sm:max-w-sm sm:p-6">
        <div>
          <div class="mx-auto flex h-12 w-12 items-center justify-center rounded-full bg-green-100">


            <svg class="h-6 w-6 text-green-600" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"
              stroke-width="1.5" stroke="currentColor" class="w-6 h-6">
              <path stroke-linecap="round" stroke-linejoin="round"
                d="M12.75 3.03v.568c0 .334.148.65.405.864l1.068.89c.442.369.535 1.01.216 1.49l-.51.766a2.25 2.25 0 01-1.161.886l-.143.048a1.107 1.107 0 00-.57 1.664c.369.555.169 1.307-.427 1.605L9 13.125l.423 1.059a.956.956 0 01-1.652.928l-.679-.906a1.125 1.125 0 00-1.906.172L4.5 15.75l-.612.153M12.75 3.031a9 9 0 00-8.862 12.872M12.75 3.031a9 9 0 016.69 14.036m0 0l-.177-.529A2.25 2.25 0 0017.128 15H16.5l-.324-.324a1.453 1.453 0 00-2.328.377l-.036.073a1.586 1.586 0 01-.982.816l-.99.282c-.55.157-.894.702-.8 1.267l.073.438c.08.474.49.821.97.821.846 0 1.598.542 1.865 1.345l.215.643m5.276-3.67a9.012 9.012 0 01-5.276 3.67m0 0a9 9 0 01-10.275-4.835M15.75 9c0 .896-.393 1.7-1.016 2.25" />
            </svg>



          </div>
          <div class="mt-3 text-center sm:mt-5">
            <h3 class="text-lg font-medium leading-6 text-gray-900" id="modal-title">
              {{ 'Сменить язык' | translate }}
            </h3>
            <div class="mt-7">

              <ng-container *ngFor="let lang of languages; let i=index">

                <button (click)="setLang(lang.infoParam)" type="button" class="mb-3 inline-flex w-full justify-center rounded-full border border-gray-300 bg-white px-4 py-2
                text-base font-medium text-gray-700 shadow-sm hover:bg-gray-50 focus:outline-none focus:ring-2
                focus:ring-indigo-500 focus:ring-offset-2 sm:text-sm disabled:bg-slate-200 disabled:opacity-50"
                  [disabled]="!lang.isEnabled">

                  <img class="-ml-1 mr-2 h-5 w-5" src="./assets/svg/{{lang.iconPath}}.svg" alt="">
                  {{lang.name}}

                </button>

              </ng-container>




            </div>
          </div>
        </div>
        <div class="mt-5 sm:mt-6">
          <button type="button" (click)="closePopover()"
            class="inline-flex w-full justify-center rounded-full border border-transparent bg-indigo-600 px-4 py-2 text-base font-medium text-white shadow-sm hover:bg-indigo-700 focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:ring-offset-2 sm:text-sm">
            {{'Оставить все как есть' | translate}}
          </button>
        </div>
      </div>
    </div>
  </div>
