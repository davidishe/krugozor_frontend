<li class="text-gray-900 relative select-none py-2 pl-3 pr-9 hover:bg-indigo-700 cursor-pointer hover:text-white"
  id="listbox-option-0" role="option" [ngClass]="{'bg-indigo-50': isSelected}">
  <!-- Selected: "font-semibold", Not Selected: "font-normal" -->
  <span class="font-normal block truncate" [ngClass]="{'font-semibold': isSelected}">
    <ng-content></ng-content>
  </span>

  <!--  
        Checkmark, only display for selected option.
        Highlighted: "text-white", Not Highlighted: "text-indigo-600"
  -->
  <ng-container *ngIf="isSelected">
    <span class="absolute inset-y-0 right-0 flex items-center pr-4 text-black font-semibold">
      <svg class="h-5 w-5 text-black" [ngClass]="{'text-white': !isHovered}" viewBox="0 0 20 20" fill="currentColor"
        aria-hidden="true">
        <path fill-rule="evenodd"
          d="M16.704 4.153a.75.75 0 01.143 1.052l-8 10.5a.75.75 0 01-1.127.075l-4.5-4.5a.75.75 0 011.06-1.06l3.894 3.893 7.48-9.817a.75.75 0 011.05-.143z"
          clip-rule="evenodd" />
      </svg>
    </span>
  </ng-container>

</li>
