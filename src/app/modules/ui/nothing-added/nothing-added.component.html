        <ng-content></ng-content>

      <div class="flex min-h-full flex-col bg-white pt-16 pb-12 transition-all">
        <main class="mx-auto flex w-full max-w-7xl flex-grow flex-col justify-center px-6 lg:px-8">
          <div class="py-16">
            <div class="text-center flex flex-col">
              <div class="mt-2 text-xl font-bold tracking-tight text-gray-900 sm:text-xl">
                <!-- {{'Похоже, ничего не найдено...' | translate}}. -->
                {{ textTitle }}
              </div>
              <p class="mt-2 text-base text-gray-500">
                <!-- {{'Сбросьте фильтры поиска, чтобы найти информацию' | translate}}. -->
                {{ textSubTitle }}
              </p>
              <div class="mt-6  flex mx-auto opacity-80 hover:opacity-100" style="cursor: pointer;"
                *ngIf="textBtnTitle">
                <div class="text-base font-medium text-indigo-600  self-center flex justify-center mr-2">
                  {{ textBtnTitle }}
                </div>
                <svg class="text-base font-medium text-indigo-600 " xmlns="http://www.w3.org/2000/svg" fill="none"
                  viewBox="0 0 24 24" stroke-width="1.5" stroke="#4F46E5" class="w-6 h-6 self-center"
                  [ngClass]="{'rotate': isLoading}">
                  <path stroke-linecap="round" stroke-linejoin="round"
                    d="M16.023 9.348h4.992v-.001M2.985 19.644v-4.992m0 0h4.992m-4.993 0l3.181 3.183a8.25 8.25 0 0013.803-3.7M4.031 9.865a8.25 8.25 0 0113.803-3.7l3.181 3.182m0-4.991v4.99" />
                </svg>

              </div>
            </div>
          </div>
        </main>

      </div>
